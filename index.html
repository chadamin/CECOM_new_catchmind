<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 캐치마인드</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

  <!-- p5 / ml5 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
  <script src="https://unpkg.com/ml5@0.12.2/dist/ml5.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main>

    <!-- =====================
         시작 화면
    ====================== -->
    <section id="start-screen" class="screen active">
      <div id="start-board"></div>

      <button class="start-btn"
        onclick="Game.start()"
        aria-label="게임 시작">
      </button>
    </section>


    <!-- =====================
         게임 화면
    ====================== -->
    <section id="game-screen" class="screen">

      <div id="canvas-container">

        <!-- 버튼 레이어 -->
        <div class="controls">

          <!-- ✅ 제출 버튼 (내부 SVG 완전 제거) -->
          <button class="submit-btn"
                  onclick="Game.submit()"
                  aria-label="제출하기">
          </button>

          <!-- ✅ 다시 그리기 버튼 (내부 SVG 제거) -->
          <button class="reset-btn"
                  onclick="Game.reset()"
                  aria-label="다시 그리기">
          </button>

        </div>

        <!-- 타이머 -->
        <div class="chalk-timer">
          <div id="chalk-bar" class="chalk-bar"></div>
          <span id="timer-text">20</span>
        </div>

      </div>

    </section>


    <!-- =====================
         결과 화면
    ====================== -->
    <section id="result-screen" class="screen overlay">
      <div class="result-png">
        <h1 id="result-text"></h1>
        <p id="ai-thought"></p>
        <button class="restart-btn" onclick="Game.restart()" aria-label="다시 도전"></button>
      </div>
      <img src="파이팅푸앙배경없음.png" class="result-puang" />
    </section>

  </main>


  <!-- =====================
       JS 파일
  ====================== -->
  <script src="canvas.js"></script>
  <script src="timer.js"></script>
  <script src="ai.js"></script>
  <script src="game.js"></script>
  <script src="sketch.js"></script>

</body>
</html>
